# ==============================
# FAMS Nginx 反向代理配置
# ==============================
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 限流：登录接口 10r/m per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    # 限流：通用 API 100r/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # 客户端最大 body 20M（盘点批量提交）
    client_max_body_size 20m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;

        # ---- User Service ----
        location /api/v1/user/ {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://host.docker.internal:8888;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Asset Service ----
        location /api/v1/asset/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://host.docker.internal:8889;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Workflow Service ----
        location /api/v1/workflow/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://host.docker.internal:8890;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Inventory Service ----
        location /api/v1/inventory/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://host.docker.internal:8891;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Report Service ----
        location /api/v1/report/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://host.docker.internal:8892;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Health ----
        location /health {
            return 200 'ok';
        }
    }
}
