version: "3.8"

# ==============================
# FAMS 基础设施 Docker Compose
# ==============================
# 使用方式：
#   cp docker-compose-env.example.yml docker-compose-env.yml
#   docker compose --env-file docker-compose-env.yml up -d
#
# 包含：PostgreSQL / MySQL / MongoDB / Redis / Kafka / etcd
#       Jaeger / Prometheus / Grafana / 各 Exporter
# 不包含：业务 Go 进程（本地 go run 启动）

services:
  # ==============================
  # 1. 关系型数据库 — PostgreSQL 16
  # ==============================
  # 职责：User / Workflow / Inventory 业务表 + Report 物化宽表
  postgres:
    image: postgres:16-alpine
    container_name: fams-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ../sql/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ../sql/postgres/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
      - ../sql/postgres/003_report_init.sql:/docker-entrypoint-initdb.d/003_report_init.sql:ro
      - ../../data/postgres/data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "log_statement=mod"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fams-net

  # ==============================
  # 2. 关系型数据库 — MySQL 8.0
  # ==============================
  # 职责：Asset Ledger 资产台账 + 事件去重表
  mysql:
    image: mysql:8.0
    container_name: fams-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ../sql/mysql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ../sql/mysql/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
      - ../../data/mysql/data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --explicit_defaults_for_timestamp=true
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fams-net

  # ==============================
  # 3. 文档数据库 — MongoDB 7.0
  # ==============================
  # 职责：盘点草稿 (inventory_draft) 高并发无模式暂存
  mongo:
    image: mongo:7.0
    container_name: fams-mongo
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - ../../data/mongo/data:/data/db
      - ../../data/mongo/configdb:/data/configdb
      - ../sql/mongo/001_init.js:/docker-entrypoint-initdb.d/001_init.js:ro
    command:
      - --wiredTigerCacheSizeGB=1
      - --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fams-net

  # ==============================
  # 4. 缓存与分布式锁 — Redis 7.2
  # ==============================
  # 职责：JWT Session / Blacklist / 盘点分布式锁
  redis:
    image: redis:7.2-alpine
    container_name: fams-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ../../data/redis/data:/data
    command: "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fams-net

  # ==============================
  # 5. 消息队列 — Kafka 3.x (KRaft)
  # ==============================
  # 职责：资产生命周期事件 / 盘点比对任务
  # 采用 KRaft 模式，无需 ZooKeeper
  kafka:
    image: apache/kafka:3.9.0
    container_name: fams-kafka
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://localhost:9093,PLAINTEXT_CONTAINER://kafka:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094,PLAINTEXT_CONTAINER://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_CONTAINER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - ../../data/kafka/data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9094 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - fams-net

  # ==============================
  # 6. 服务注册与发现 — etcd 3.5
  # ==============================
  # 职责：go-zero gRPC 服务注册
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: fams-etcd
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      ETCD_NAME: fams-etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_AUTO_COMPACTION_RETENTION: "1"
    ports:
      - "${ETCD_PORT}:2379"
      - "2380:2380"
    command:
      - /usr/local/bin/etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=fams-etcd=http://etcd:2380
      - --initial-cluster-token=fams-etcd-cluster
      - --initial-cluster-state=new
      - --data-dir=/etcd-data
      - --quota-backend-bytes=8589934592
      - --max-request-bytes=10485760
      - --log-level=info
    volumes:
      - ../../data/etcd/data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://127.0.0.1:2379"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fams-net

  # ==============================
  # 7. 分布式链路追踪 — Jaeger all-in-one
  # ==============================
  # 职责：接收 OTLP gRPC (4317) / HTTP (4318) Trace 上报
  # 开发环境使用内存存储 (badger)；生产环境切换 ES/Cassandra
  jaeger:
    image: jaegertracing/all-in-one:1.57.0
    container_name: fams-jaeger
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_KEY: /badger/data
      BADGER_DIRECTORY_VALUE: /badger/data
      LOG_LEVEL: info
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"   # OTLP gRPC（go-zero Telemetry 上报端口）
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Web UI
      - "14268:14268" # HTTP Collector（兼容旧版）
      - "14250:14250" # gRPC Collector（兼容旧版）
    volumes:
      - ../../data/jaeger/data:/badger/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fams-net

  # ==============================
  # 8. 指标采集 — Prometheus
  # ==============================
  # 职责：Pull 模式抓取各微服务 /metrics + Exporter 端点
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: fams-prometheus
    restart: unless-stopped
    user: root
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../data/prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    networks:
      - fams-net

  # ==============================
  # 9. 可视化监控 — Grafana
  # ==============================
  # 职责：监控大盘 + 统一告警
  grafana:
    image: grafana/grafana:11.0.0
    container_name: fams-grafana
    restart: unless-stopped
    user: root
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - ../../data/grafana/data:/var/lib/grafana
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - fams-net

  # ==============================
  # 10. PostgreSQL Exporter
  # ==============================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: fams-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - fams-net

  # ==============================
  # 11. MySQL Exporter
  # ==============================
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: fams-mysqld-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${MYSQL_USER}:${MYSQL_PASSWORD}@(mysql:3306)/${MYSQL_DATABASE}"
    ports:
      - "9104:9104"
    depends_on:
      - mysql
    networks:
      - fams-net

  # ==============================
  # 12. Redis Exporter
  # ==============================
  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: fams-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - fams-net

  # ==============================
  # 13. Kafka Exporter
  # ==============================
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: fams-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    networks:
      - fams-net

  # ==============================
  # 14. MongoDB Exporter
  # ==============================
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: fams-mongodb-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://mongo:27017
      - --compatible-mode
    ports:
      - "9216:9216"
    depends_on:
      - mongo
    networks:
      - fams-net

# ==============================
# 网络配置
# ==============================
networks:
  fams-net:
    driver: bridge
    name: fams-net
