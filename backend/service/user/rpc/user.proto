syntax = "proto3";

package user;

option go_package = "./user";

service User {
  rpc FindUser(FindUserReq) returns (FindUserResp);
  rpc GetDeptSubtree(GetDeptSubtreeReq) returns (GetDeptSubtreeResp);
  rpc ValidateToken(ValidateTokenReq) returns (ValidateTokenResp);
}

message FindUserReq {
  int64 user_id = 1;
  string username = 2;
}

message FindUserResp {
  int64 id = 1;
  string username = 2;
  string password_hash = 3;
  string real_name = 4;
  int32 role_level = 5;
  int64 department_id = 6;
  int32 status = 7;
}

message GetDeptSubtreeReq {
  int64 dept_id = 1;
}

message GetDeptSubtreeResp {
  repeated int64 dept_ids = 1;
}

message ValidateTokenReq {
  string token = 1;
}

message ValidateTokenResp {
  bool valid = 1;
  int64 user_id = 2;
  int32 role_level = 3;
  int64 dept_id = 4;
}
